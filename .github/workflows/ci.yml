name: CI / CD - yafa-pwa

# push to main      → staging   (image tag :staging, /opt/yafa-pwa-staging)
# published release → production (image tags :<version> + :latest, /opt/yafa-pwa)
on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: yafa-pwa

jobs:
  # ── Quality gates (run in parallel) ────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn type-check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test:unit

  # ── Staging (push to main) ─────────────────────────────────────────────────
  build-staging:
    name: Build & Push (staging)
    if: github.event_name == 'push'
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile

      # The Dockerfile only copies dist/, so the Vite build (which bakes in the
      # API base URL) runs here, before the image is built.
      - name: Build staging
        run: yarn build:staging
        env:
          VITE_API_BASE_URL: ${{ vars.STAGING_ADMIN_BASE_URL }}

      - name: Log in to the container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v7 
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:staging

  deploy-staging:
    name: Deploy (staging)
    needs: build-staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_IP: ${{ secrets.VPS_IP }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          REGISTRY_USER: ${{ github.actor }}
          DEPLOY_PATH: /opt/yafa-pwa-staging
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$VPS_IP" >> ~/.ssh/known_hosts

          # Ship the staging compose file (renamed to docker-compose.yml).
          cat docker-compose.staging.yml | ssh "$VPS_USER@$VPS_IP" \
            "sudo mkdir -p $DEPLOY_PATH && sudo tee $DEPLOY_PATH/docker-compose.yml > /dev/null"

          # The VPS — not the runner — does the pull, so authenticate it to GHCR
          # (token over stdin, never in the remote argument list).
          echo "$GHCR_PAT" | ssh "$VPS_USER@$VPS_IP" \
            "sudo docker login $REGISTRY -u $REGISTRY_USER --password-stdin"

          ssh "$VPS_USER@$VPS_IP" \
            "cd $DEPLOY_PATH && sudo docker compose pull && sudo docker compose up -d"

  # ── Production (release) ───────────────────────────────────────────────────
  build-production:
    name: Build & Push (production)
    if: github.event_name == 'release'
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile

      - name: Build production
        run: yarn build:production
        env:
          VITE_API_BASE_URL: ${{ vars.PROD_ADMIN_BASE_URL }}

      - name: Log in to the container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Derive image tags (version + latest)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-production:
    name: Deploy (production)
    needs: build-production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_IP: ${{ secrets.VPS_IP }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          REGISTRY_USER: ${{ github.actor }}
          DEPLOY_PATH: /opt/yafa-pwa
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$VPS_IP" >> ~/.ssh/known_hosts

          # Ship the production compose file (renamed to docker-compose.yml).
          cat docker-compose.yml | ssh "$VPS_USER@$VPS_IP" \
            "sudo mkdir -p $DEPLOY_PATH && sudo tee $DEPLOY_PATH/docker-compose.yml > /dev/null"

          # The VPS — not the runner — does the pull, so authenticate it to GHCR
          # (token over stdin, never in the remote argument list).
          echo "$GHCR_PAT" | ssh "$VPS_USER@$VPS_IP" \
            "sudo docker login $REGISTRY -u $REGISTRY_USER --password-stdin"

          ssh "$VPS_USER@$VPS_IP" \
            "cd $DEPLOY_PATH && sudo docker compose pull && sudo docker compose up -d"
