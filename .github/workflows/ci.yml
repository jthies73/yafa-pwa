name: CI / CD - yafa-pwa

on:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

# Cancel superseded runs on the same ref, but never cancel a release run.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jthies73/yafa-pwa

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn type-check

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test:unit

  # ── Staging (push to main) ───────────────────────────────────────────────

  build-staging:
    name: Build (staging)
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Build Staging
        run: yarn build:staging
        env:
          VITE_API_BASE_URL: ${{ vars.STAGING_ADMIN_BASE_URL || secrets.STAGING_ADMIN_BASE_URL }}
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - name: Build and push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-staging]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging via SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts
          
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} 'sudo mkdir -p /opt/yafa-pwa-staging'
          cat docker-compose.staging.yml | ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} 'sudo tee /opt/yafa-pwa-staging/docker-compose.yml > /dev/null'
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} 'cd /opt/yafa-pwa-staging && sudo docker compose pull && sudo docker compose up -d --remove-orphans'

  # ── Production (release) ────────────────────────────────────────────────

  build-production:
    name: Build (production)
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Build Production
        run: yarn build:production
        env:
          VITE_API_BASE_URL: ${{ vars.PROD_ADMIN_BASE_URL || secrets.PROD_ADMIN_BASE_URL }}
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-production]
    if: github.event_name == 'release'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production via SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts
          
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} 'sudo mkdir -p /opt/yafa-pwa'
          cat docker-compose.yml | ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} 'sudo tee /opt/yafa-pwa/docker-compose.yml > /dev/null'
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} 'cd /opt/yafa-pwa && sudo docker compose pull && sudo docker compose up -d --remove-orphans'
