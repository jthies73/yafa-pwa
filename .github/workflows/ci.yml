name: CI / CD - yafa-pwa

on:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

# Cancel superseded runs on the same ref, but never cancel a release run.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn type-check

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test:unit

  build-staging:
    name: Build (staging)
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn build:staging
      - uses: actions/upload-artifact@v4
        with:
          name: dist-staging
          path: dist/
          retention-days: 1
          if-no-files-found: error

  build-production:
    name: Build (production)
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn build:production
      - uses: actions/upload-artifact@v4
        with:
          name: dist-production
          path: dist/
          retention-days: 1
          if-no-files-found: error

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-staging]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    environment: staging
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-staging
          path: dist/
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa_deploy
          chmod 600 ~/.ssh/id_rsa_deploy
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts
      - name: Sync dist to staging
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa_deploy -o StrictHostKeyChecking=no" \
            --rsync-path="sudo rsync" \
            dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/opt/yafa-pwa-staging/html/

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-production]
    if: github.event_name == 'release'
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-production
          path: dist/
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa_deploy
          chmod 600 ~/.ssh/id_rsa_deploy
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts
      - name: Sync dist to production
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa_deploy -o StrictHostKeyChecking=no" \
            --rsync-path="sudo rsync" \
            dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/opt/yafa-pwa/html/
