<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-512x512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08060d" />
    <meta name="description" content="Yet Another Fitness App - Keep track of your workouts and measurements." />
    <title>Yafa - Yet Another Fitness App</title>
    <style>
      /* Reset and base styles for static landing page */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #08060d;
        color: #fff;
        overflow: hidden;
      }

      /* Polished, minimalistic, flat, and technical landing page */
      .landing-page {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #08060d;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        overflow: hidden;
      }

      .landing-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        max-width: 360px;
        width: 90%;
      }

      .landing-logo-container {
        position: relative;
        width: 120px;
        height: 120px;
        margin-bottom: 32px;
      }

      .landing-logo {
        position: relative;
        width: 100%;
        height: 100%;
        z-index: 2;
      }

      .landing-title {
        font-size: 32px;
        font-weight: 800;
        letter-spacing: 8px;
        margin: 0 0 8px 0;
        color: #ffffff;
        text-transform: uppercase;
      }

      .landing-subtitle {
        font-size: 13px;
        letter-spacing: 2px;
        color: #8a8897;
        text-transform: uppercase;
        margin: 0 0 48px 0;
      }

      .redirect-container {
        width: 100%;
        margin-bottom: 32px;
      }

      .progress-bar-container {
        width: 100%;
        height: 2px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
        margin-bottom: 12px;
      }

      .progress-bar-fill {
        height: 100%;
        width: 100%;
        background: #1fc7b9;
      }

      .redirect-text {
        font-size: 12px;
        color: #8a8897;
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        letter-spacing: 0.5px;
      }

      .time-num {
        color: #1fc7b9;
        font-weight: 500;
      }

      .skip-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #d1d0db;
        padding: 8px 20px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        text-decoration: none;
      }

      .skip-btn:hover {
        background: #1fc7b9;
        border-color: #1fc7b9;
        color: #08060d;
      }

      .skip-btn:active {
        background: #19a398;
        border-color: #19a398;
      }

      .arrow-icon {
        width: 14px;
        height: 14px;
        transition: transform 0.2s ease;
      }

      .skip-btn:hover .arrow-icon {
        transform: translateX(2px);
      }

      /* Hidden utility class to allow body overflow once app is active */
      body.app-active {
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <!-- 100% static, SEO-crawlable landing page that overlays immediately -->
    <div id="static-landing" class="landing-page">
      <div class="landing-content">
        <div class="landing-logo-container">
          <svg class="landing-logo" viewBox="0 0 200 200" fill="none" aria-label="Yafa Logo">
            <!-- Left arm -->
            <path d="M55 45 L100 95" stroke="#1fc7b9" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
            <!-- Right arm -->
            <path d="M145 45 L100 95" stroke="#1fc7b9" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
            <!-- Heartbeat stem -->
            <path d="M100 95 L100 115 L80 125 L120 137 L100 147 L100 170" stroke="#1fc7b9" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>

        <h1 class="landing-title">YAFA</h1>
        <p class="landing-subtitle">Yet Another Fitness App</p>

        <div class="redirect-container">
          <div class="progress-bar-container">
            <div id="progress-fill" class="progress-bar-fill"></div>
          </div>
          <p class="redirect-text">
            Entering dashboard in <span id="timer-count" class="time-num">3</span>s...
          </p>
        </div>

        <button class="skip-btn" onclick="skipLanding()">
          <span>Skip to Dashboard</span>
          <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </div>
    </div>

    <!-- The Vue application element -->
    <div id="app"></div>

    <!-- Redirect script for static landing page -->
    <script>
      (function() {
        var startTime = Date.now();
        var duration = 3000;
        var progressBar = document.getElementById('progress-fill');
        var timerText = document.getElementById('timer-count');
        var landing = document.getElementById('static-landing');
        
        var interval = setInterval(function() {
          var elapsed = Date.now() - startTime;
          
          // Animate the progress bar from 100% to 0%
          var percent = Math.max(0, 100 - (elapsed / duration) * 100);
          if (progressBar) {
            progressBar.style.width = percent + '%';
          }
          
          // Update the countdown text
          var secondsLeft = Math.ceil(Math.max(0, (duration - elapsed) / 1000));
          if (timerText) {
            timerText.textContent = secondsLeft;
          }
          
          if (elapsed >= duration) {
            clearInterval(interval);
            closeLanding();
          }
        }, 16);
        
        window.skipLanding = function() {
          clearInterval(interval);
          closeLanding();
        };
        
        function closeLanding() {
          if (landing) {
            landing.style.opacity = '0';
            document.body.classList.add('app-active');
            setTimeout(function() {
              landing.remove();
            }, 500);
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
