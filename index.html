<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-512x512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08060d" />
    <meta name="description" content="Yet Another Fitness App - Keep track of your workouts and measurements." />
    <title>Yafa - Yet Another Fitness App</title>
    <style>
      /* Reset and base styles for static landing page */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #08060d;
        color: #fff;
        overflow: hidden;
      }

      /* Premium radial gradient background */
      .landing-page {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #111422 0%, #08060d 100%);
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
      }

      .landing-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        max-width: 400px;
        width: 90%;
      }

      .landing-logo-container {
        position: relative;
        width: 140px;
        height: 140px;
        margin-bottom: 24px;
      }

      .landing-logo {
        position: relative;
        width: 100%;
        height: 100%;
        z-index: 2;
        animation: landing-pulse 2s infinite ease-in-out;
      }

      .logo-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100px;
        height: 100px;
        background: rgba(31, 199, 185, 0.4);
        filter: blur(40px);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        z-index: 1;
        animation: glow-pulse 2s infinite ease-in-out;
      }

      @keyframes landing-pulse {
        0%, 100% {
          transform: scale(1);
          filter: drop-shadow(0 0 10px rgba(31, 199, 185, 0.3));
        }
        50% {
          transform: scale(1.05);
          filter: drop-shadow(0 0 25px rgba(31, 199, 185, 0.6));
        }
      }

      @keyframes glow-pulse {
        0%, 100% {
          opacity: 0.6;
          transform: translate(-50%, -50%) scale(0.9);
        }
        50% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.2);
        }
      }

      .landing-title {
        font-size: 40px;
        font-weight: 700;
        letter-spacing: 4px;
        margin: 0 0 8px 0;
        background: linear-gradient(135deg, #1fc7b9 0%, #0fd8ca 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 30px rgba(31, 199, 185, 0.15);
      }

      .landing-subtitle {
        font-size: 15px;
        letter-spacing: 0.5px;
        color: #8a8897;
        margin: 0 0 40px 0;
      }

      .redirect-container {
        width: 100%;
        margin-bottom: 30px;
      }

      .progress-bar-container {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 3px;
        overflow: hidden;
        margin-bottom: 12px;
      }

      .progress-bar-fill {
        height: 100%;
        width: 100%;
        background: #1fc7b9;
        box-shadow: 0 0 10px rgba(31, 199, 185, 0.5);
        border-radius: 3px;
      }

      .redirect-text {
        font-size: 13px;
        color: #7b7987;
        margin: 0;
      }

      .time-num {
        color: #1fc7b9;
        font-weight: 600;
      }

      .skip-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #d1d0db;
        padding: 10px 20px;
        border-radius: 30px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
      }

      .skip-btn:hover {
        background: rgba(31, 199, 185, 0.1);
        border-color: rgba(31, 199, 185, 0.4);
        color: #fff;
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(31, 199, 185, 0.15);
      }

      .skip-btn:active {
        transform: translateY(0);
      }

      .arrow-icon {
        width: 16px;
        height: 16px;
        transition: transform 0.3s ease;
      }

      .skip-btn:hover .arrow-icon {
        transform: translateX(3px);
      }

      /* Hidden utility class to allow body overflow once app is active */
      body.app-active {
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <!-- 100% static, SEO-crawlable landing page that overlays immediately -->
    <div id="static-landing" class="landing-page">
      <div class="landing-content">
        <div class="landing-logo-container">
          <svg class="landing-logo" viewBox="0 0 200 200" fill="none" aria-label="Yafa Logo">
            <!-- Left arm -->
            <path d="M55 45 L100 95" stroke="#1fc7b9" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
            <!-- Right arm -->
            <path d="M145 45 L100 95" stroke="#1fc7b9" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
            <!-- Heartbeat stem -->
            <path d="M100 95 L100 115 L80 125 L120 137 L100 147 L100 170" stroke="#1fc7b9" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <div class="logo-glow"></div>
        </div>

        <h1 class="landing-title">YAFA</h1>
        <p class="landing-subtitle">Yet Another Fitness App</p>

        <div class="redirect-container">
          <div class="progress-bar-container">
            <div id="progress-fill" class="progress-bar-fill"></div>
          </div>
          <p class="redirect-text">
            Entering dashboard in <span id="timer-count" class="time-num">3</span>s...
          </p>
        </div>

        <button class="skip-btn" onclick="skipLanding()">
          <span>Skip to Dashboard</span>
          <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </div>
    </div>

    <!-- The Vue application element -->
    <div id="app"></div>

    <!-- Redirect script for static landing page -->
    <script>
      (function() {
        var startTime = Date.now();
        var duration = 3000;
        var progressBar = document.getElementById('progress-fill');
        var timerText = document.getElementById('timer-count');
        var landing = document.getElementById('static-landing');
        
        var interval = setInterval(function() {
          var elapsed = Date.now() - startTime;
          
          // Animate the progress bar from 100% to 0%
          var percent = Math.max(0, 100 - (elapsed / duration) * 100);
          if (progressBar) {
            progressBar.style.width = percent + '%';
          }
          
          // Update the countdown text
          var secondsLeft = Math.ceil(Math.max(0, (duration - elapsed) / 1000));
          if (timerText) {
            timerText.textContent = secondsLeft;
          }
          
          if (elapsed >= duration) {
            clearInterval(interval);
            closeLanding();
          }
        }, 16);
        
        window.skipLanding = function() {
          clearInterval(interval);
          closeLanding();
        };
        
        function closeLanding() {
          if (landing) {
            landing.style.opacity = '0';
            document.body.classList.add('app-active');
            setTimeout(function() {
              landing.remove();
            }, 500);
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
