server {
    listen 80;
    server_name yafa.app staging.yafa.app localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ==========================================
    # Gzip Compression (Crucial for Vue Bundles)
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ==========================================
    # SEO & Core Files (Strict 404, No Fallback)
    # ==========================================
    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location = /sitemap.xml {
        try_files $uri =404;
        access_log off;
        log_not_found off;
        default_type text/xml;
    }

    location = /llms.txt {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    # ==========================================
    # Custom Routes / Legacy HTML Files
    # ==========================================
    location ~ ^/jthies73/?$ {
        try_files /jthies73.html =404;
    }

    # ==========================================
    # Bundled Assets (Vite / Webpack / Nuxt)
    # ==========================================
    # Safely caches hashed assets forever without breaking dots in Vue Router URLs
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ==========================================
    # Miscellaneous Static Media
    # ==========================================
    # Catches icons, global images, or static webfonts at the root level
    location ~* \.(ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webm)$ {
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # ==========================================
    # 404 Error Handler
    # ==========================================
    # Serve 404.html for missing resources (files with extensions)
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ==========================================
    # Vue Router History Mode Fallback
    # ==========================================
    # Serves the main app. Forces browsers to always revalidate index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # ==========================================
    # Optional Security Headers
    # ==========================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
}